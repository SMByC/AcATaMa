name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Build extlibs archive
        run: |
          rm -rf extlibs_tmp extlibs.zip
          pip install \
            --target=extlibs_tmp \
            --no-deps \
            -r requirements-extlibs.txt

          # Clean up unnecessary files
          cd extlibs_tmp
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path(".")
          for path in sorted(root.rglob("*"), reverse=True):
              if path.is_dir() and (path.name in {"__pycache__", "tests", "test", "bin"} or path.name.endswith((".dist-info", ".egg-info"))):
                  shutil.rmtree(path, ignore_errors=True)
          for path in root.rglob("*"):
              if path.is_file() and path.suffix in {".pyc", ".pyo", ".so", ".dll", ".dylib"}:
                  path.unlink(missing_ok=True)
          PY
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH="$PWD" python -c "import dask; assert callable(dask.compute); assert callable(dask.delayed)"
          zip -9r ../extlibs.zip .

      - name: Create GitHub Release
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Automated release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}

      - name: Package and release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSGEO_USERNAME: ${{ secrets.OSGEO_USERNAME }}
          OSGEO_PASSWORD: ${{ secrets.OSGEO_PASSWORD }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi

          ARGS=(--github-token "$GITHUB_TOKEN")

          if [ -n "$OSGEO_USERNAME" ] && [ -n "$OSGEO_PASSWORD" ]; then
            ARGS+=(--osgeo-username "$OSGEO_USERNAME" --osgeo-password "$OSGEO_PASSWORD")
          fi

          qgis-plugin-ci release "$RELEASE_TAG" "${ARGS[@]}"

      - name: Upload extlibs release asset
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Invalid release tag: $RELEASE_TAG" >&2
            exit 1
          fi
          gh release upload "$RELEASE_TAG" extlibs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
