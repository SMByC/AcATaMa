name: Package

on:
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up Git LFS
        run: |
          git lfs install
          git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install qgis-plugin-ci
        run: pip install qgis-plugin-ci

      - name: Get latest tag
        id: get_tag
        run: |
          LATEST_TAG=$(git tag --sort=-creatordate | head -1)
          if [[ ! "$LATEST_TAG" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            echo "Invalid release tag: $LATEST_TAG" >&2
            exit 1
          fi
          printf 'tag=%s\n' "$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST_TAG"

      - name: Build extlibs archive
        run: |
          rm -rf extlibs_tmp extlibs.zip
          pip install \
            --target=extlibs_tmp \
            --no-deps \
            -r requirements-extlibs.txt

          # Clean up unnecessary files
          cd extlibs_tmp
          python - <<'PY'
          from pathlib import Path
          import shutil

          root = Path(".")
          for path in sorted(root.rglob("*"), reverse=True):
              if path.is_dir() and (path.name in {"__pycache__", "tests", "test", "bin"} or path.name.endswith((".dist-info", ".egg-info"))):
                  shutil.rmtree(path, ignore_errors=True)
          for path in root.rglob("*"):
              if path.is_file() and path.suffix in {".pyc", ".pyo", ".so", ".dll", ".dylib"}:
                  path.unlink(missing_ok=True)
          PY
          PYTHONDONTWRITEBYTECODE=1 PYTHONPATH="$PWD" python -c "import dask; assert callable(dask.compute); assert callable(dask.delayed)"
          zip -9r ../extlibs.zip .

      - name: Build package
        env:
          PACKAGE_TAG: ${{ steps.get_tag.outputs.tag }}
        run: qgis-plugin-ci package "$PACKAGE_TAG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AcATaMa-${{ steps.get_tag.outputs.tag }}
          path: |
            AcATaMa.${{ steps.get_tag.outputs.tag }}.zip
            extlibs.zip
